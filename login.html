<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Smart Resource Allocation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { width:100%; max-width:440px; padding:2.5rem; }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-header .logo { font-size:1.5rem; font-weight:900; margin-bottom:0.5rem; }
    .auth-header h1 { font-size:1.6rem; font-weight:800; margin-bottom:0.3rem; }
    .auth-header p { color:var(--text-secondary); font-size:0.9rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--text-tertiary); }
    .auth-footer a { color:var(--accent-primary); font-weight:600; }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-tertiary); cursor:pointer; font-size:1.1rem; }
    .forgot-link { text-align:right; margin-top:-8px; margin-bottom:16px; }
    .forgot-link a { font-size:0.85rem; color:var(--text-accent); }
    .divider { display:flex; align-items:center; gap:12px; margin:1.5rem 0; color:var(--text-tertiary); font-size:0.8rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border-subtle); }
    .demo-box { padding:1rem; border-radius:var(--radius-md); background:rgba(139,92,246,0.06); border:1px solid rgba(139,92,246,0.15); }
    .demo-box p { font-size:0.8rem; color:var(--text-secondary); margin-bottom:4px; }
    .demo-box code { font-size:0.8rem; color:var(--text-accent); font-family:var(--font-mono); }

    /* Social login buttons */
    .social-login-section { margin-bottom: 0; }
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md, 8px);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border-subtle, rgba(255,255,255,0.1));
    }
    .btn-google {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary, #f1f5f9);
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(66,133,244,0.5);
      box-shadow: 0 0 20px rgba(66,133,244,0.15);
      transform: translateY(-1px);
    }
    .btn-google svg { width:20px; height:20px; flex-shrink:0; }
    .btn-auth0 {
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary, #94a3b8);
      font-size: 0.85rem;
      padding: 10px 16px;
      margin-top: 8px;
    }
    .btn-auth0:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="creative-bg"><div class="glow-orb orb-1"></div><div class="glow-orb orb-2"></div></div>

  <div class="auth-page">
    <div class="glass-card auth-card scale-in">
      <div class="auth-header">
        <div class="logo text-gradient">⚡ SmartAlloc</div>
        <h1>Welcome Back</h1>
        <p>Sign in to continue coordinating</p>
      </div>

      <!-- Social Login -->
      <div class="social-login-section">
        <button class="btn-social btn-google" onclick="loginWithGoogle()" id="btn-google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="btn-social btn-auth0" onclick="loginWithAuth0()" id="btn-auth0-all">
          🔐 More login options
        </button>
      </div>

      <div class="divider">or sign in with email</div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrapper">
          <input type="password" id="login-password" class="form-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
          <button type="button" class="password-toggle" onclick="togglePw()">👁</button>
        </div>
      </div>

      <div class="forgot-link">
        <a href="/forgot-password.html">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" id="btn-login">Sign In →</button>

      <div class="divider">Demo Credentials</div>
      <div class="demo-box">
        <p>Admin: <code>admin@smartresource.org</code></p>
        <p>Password: <code>Admin@123456</code></p>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <!-- Auth0 SPA SDK + integration -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="/js/auth0-client.js"></script>
  <script>
    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!email || !password) return showToast('Please fill in all fields', 'error');
      
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Signing in...';
      
      try {
        const res = await api.login(email, password);
        if (res.error) { showToast(res.error, 'error'); btn.disabled = false; btn.textContent = 'Sign In →'; return; }
        showToast('Welcome back!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 800);
      } catch (err) {
        showToast(err.message || 'Login failed', 'error');
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    function togglePw() {
      const el = document.getElementById('login-password');
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    // Show error from Auth0 redirect
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      setTimeout(() => showToast?.(urlParams.get('error'), 'error'), 500);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Smart Resource Allocation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { width:100%; max-width:440px; padding:2.5rem; }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-header .logo { font-size:1.5rem; font-weight:900; margin-bottom:0.5rem; }
    .auth-header h1 { font-size:1.6rem; font-weight:800; margin-bottom:0.3rem; }
    .auth-header p { color:var(--text-secondary); font-size:0.9rem; }
    .success-state { text-align:center; display:none; }
    .success-icon { font-size:3rem; margin-bottom:1rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--text-tertiary); }
    .auth-footer a { color:var(--accent-primary); font-weight:600; }
  </style>
</head>
<body>
  <div class="creative-bg"><div class="glow-orb orb-1"></div><div class="glow-orb orb-2"></div></div>
  <div class="auth-page">
    <div class="glass-card auth-card scale-in">
      <div class="auth-header">
        <div class="logo text-gradient">⚡ SmartAlloc</div>
        <h1>Forgot Password</h1>
        <p>We'll send you a reset link</p>
      </div>

      <div id="form-state">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="fp-email" class="form-input" placeholder="you@example.com">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="sendResetLink()" id="btn-reset">Send Reset Link →</button>
      </div>

      <div class="success-state" id="success-state">
        <div class="success-icon">✉️</div>
        <h3 style="margin-bottom:0.5rem;">Check Your Email</h3>
        <p style="color:var(--text-secondary);font-size:0.9rem;">If an account exists, we've sent a password reset link. Check your inbox and spam folder.</p>
      </div>

      <div class="auth-footer">
        <a href="/login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script>
    async function sendResetLink() {
      const email = document.getElementById('fp-email').value.trim();
      if (!email) return showToast('Please enter your email', 'error');
      
      const btn = document.getElementById('btn-reset');
      btn.disabled = true; btn.textContent = 'Sending...';
      
      try {
        await api.forgotPassword(email);
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Send Reset Link →';
      }
    }
  </script>
</body>
</html>

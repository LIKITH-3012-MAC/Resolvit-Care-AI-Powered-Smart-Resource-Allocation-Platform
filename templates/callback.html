<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in… — Smart Resource Allocation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    .callback-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      padding: 2rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(139,92,246,0.2);
      border-top-color: var(--accent-primary, #8b5cf6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .callback-text {
      color: var(--text-secondary, #94a3b8);
      font-size: 1.1rem;
      text-align: center;
    }
    .callback-text strong {
      color: var(--text-primary, #f1f5f9);
      display: block;
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
    }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-md, 8px);
      padding: 1rem 1.5rem;
      max-width: 400px;
      text-align: center;
      color: #f87171;
      display: none;
    }
    .error-box a {
      color: var(--accent-primary, #8b5cf6);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="creative-bg"><div class="glow-orb orb-1"></div><div class="glow-orb orb-2"></div></div>

  <div class="callback-page">
    <div id="loading-state">
      <div class="spinner"></div>
    </div>
    <div class="callback-text" id="callback-text">
      <strong>Completing sign-in…</strong>
      Verifying your identity and setting up your session.
    </div>
    <div class="error-box" id="error-box">
      <p id="error-message">Authentication failed.</p>
      <a href="/login">← Back to login</a>
    </div>
  </div>

  <!-- Auth0 SPA SDK -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="/js/auth0-client.js"></script>
  <script>
    (async function() {
      // Check for error in URL params
      const params = new URLSearchParams(window.location.search);
      if (params.get('error')) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('callback-text').style.display = 'none';
        const errorBox = document.getElementById('error-box');
        errorBox.style.display = 'block';
        document.getElementById('error-message').textContent =
          params.get('error_description') || params.get('error') || 'Authentication failed';
        return;
      }

      // Check for Auth0 callback code in URL
      if (window.location.search.includes('code=') || window.location.search.includes('state=')) {
        try {
          await handleAuth0Callback();
        } catch (err) {
          document.getElementById('loading-state').style.display = 'none';
          document.getElementById('callback-text').style.display = 'none';
          const errorBox = document.getElementById('error-box');
          errorBox.style.display = 'block';
          document.getElementById('error-message').textContent = err.message || 'Login failed';
        }
      } else {
        // No auth code — redirect to login
        window.location.href = '/login';
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Smart Resource Allocation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { width:100%; max-width:440px; padding:2.5rem; }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-header .logo { font-size:1.5rem; font-weight:900; margin-bottom:0.5rem; }
    .auth-header h1 { font-size:1.6rem; font-weight:800; margin-bottom:0.3rem; }
    .auth-header p { color:var(--text-secondary); font-size:0.9rem; }
    .reset-email { color:var(--accent-primary); font-weight:600; }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-tertiary); cursor:pointer; font-size:1.1rem; }
    .error-state, .success-state { text-align:center; display:none; }
    .state-icon { font-size:3rem; margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="creative-bg"><div class="glow-orb orb-1"></div><div class="glow-orb orb-2"></div></div>
  <div class="auth-page">
    <div class="glass-card auth-card scale-in">
      <div id="loading-state" style="text-align:center;padding:2rem;">
        <div class="spinner" style="margin:0 auto 1rem;"></div>
        <p style="color:var(--text-secondary);">Validating reset link...</p>
      </div>

      <div id="form-state" style="display:none;">
        <div class="auth-header">
          <div class="logo text-gradient">⚡ SmartAlloc</div>
          <h1>Reset Password</h1>
          <p>Set a new password for <span class="reset-email" id="target-email"></span></p>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" class="form-input" placeholder="At least 8 characters" oninput="checkStrength(this.value)">
            <button type="button" class="password-toggle" onclick="togglePw('new-password')">👁</button>
          </div>
          <div class="password-strength" id="strength-meter">
            <div class="strength-bar"></div><div class="strength-bar"></div>
            <div class="strength-bar"></div><div class="strength-bar"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Repeat password">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doReset()" id="btn-reset">Reset Password →</button>
      </div>

      <div class="error-state" id="error-state">
        <div class="state-icon">⚠️</div>
        <h3 style="margin-bottom:0.5rem;">Invalid Reset Link</h3>
        <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;">This link is invalid or has expired. Please request a new one.</p>
        <a href="/forgot-password.html" class="btn btn-primary">Request New Link →</a>
      </div>

      <div class="success-state" id="success-state">
        <div class="state-icon">✅</div>
        <h3 style="margin-bottom:0.5rem;">Password Reset!</h3>
        <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;">Your password has been changed successfully.</p>
        <a href="/login.html" class="btn btn-primary">Sign In →</a>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const email = params.get('email');

    (async function() {
      if (!token || !email) { showState('error-state'); return; }
      try {
        const res = await api.validateResetToken(token, email);
        if (res.valid) {
          document.getElementById('target-email').textContent = email;
          showState('form-state');
        } else { showState('error-state'); }
      } catch { showState('error-state'); }
    })();

    async function doReset() {
      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (pw.length < 8) return showToast('Password must be at least 8 characters', 'error');
      if (pw !== confirm) return showToast('Passwords do not match', 'error');
      
      const btn = document.getElementById('btn-reset');
      btn.disabled = true; btn.textContent = 'Resetting...';
      try {
        const res = await api.resetPassword(token, email, pw);
        if (res.error) { showToast(res.error, 'error'); btn.disabled = false; btn.textContent = 'Reset Password →'; return; }
        showState('success-state');
      } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Reset Password →'; }
    }

    function showState(id) {
      ['loading-state','form-state','error-state','success-state'].forEach(s => document.getElementById(s).style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    function checkStrength(pw) {
      const bars = document.querySelectorAll('.strength-bar');
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = ['','weak','fair','good','strong'];
      bars.forEach((bar,i) => { bar.className = 'strength-bar' + (i < score ? ` active ${levels[score]}` : ''); });
    }

    function togglePw(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; }
  </script>
</body>
</html>
